# Place at /etc/nginx/conf.d/quick.conf (Fedora) or appropriate include path.
# Requires wildcard cert for *.quick.dadyprojects.tech

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name *.quick.dadyprojects.tech quick.dadyprojects.tech;

    location / {
        return 301 https://$host$request_uri;
    }

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name *.quick.dadyprojects.tech quick.dadyprojects.tech;

    ssl_certificate     /etc/letsencrypt/live/quick.dadyprojects.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/quick.dadyprojects.tech/privkey.pem;

    # Must be >= QUICK_MAX_DEPLOY_SIZE (default 50MB) + multipart overhead
    client_max_body_size 55m;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # Overwrite (do not append) client XFF — app trusts this only with QUICK_TRUST_PROXY=1
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_read_timeout 3600s;
    }

    # WebSocket: omit access logs so ?token= site tokens are not stored
    location /api/ws {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
        access_log off;
    }

    # Path-based local/dev style WS under /s/<name>/api/ws
    location ~ ^/s/[^/]+/api/ws$ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
        access_log off;
    }
}
