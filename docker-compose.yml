# Minimal run: one service + named volume for sites/db/uploads
services:
  quick:
    build: .
    image: quick:slim
    ports:
      - "8080:8080"
    environment:
      QUICK_ENV: production
      QUICK_PORT: "8080"
      QUICK_DB_PATH: /data/quick.db
      QUICK_SITES_DIR: /data/sites
      QUICK_UPLOADS_DIR: /data/uploads
      # Set to 1 only when behind a reverse proxy that overwrites X-Forwarded-For
      QUICK_TRUST_PROXY: "0"
      # Optional AI:
      # ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # QUICK_BASE_DOMAIN: quick.example.com
    volumes:
      - quick-data:/data
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true

volumes:
  quick-data:
